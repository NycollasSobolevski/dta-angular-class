<p>comida-page works!</p>
<div class="_menu">
    <app-comida-card 
        *ngFor="let _food of menu; track: $index" 
        [food]="_food" 
        (click)="onCardClick(_food)"
        >
    </app-comida-card>
</div>

<app-modal 
    *ngIf="focusedFood"
    (onClose)="focusedFood = undefined"
    [Confirmation]="true"
    [Title]="'Modalzinho'"
    SaveLabel="Efetuar pedido"
    (onSave)="save()"
>
    <h1>minha comidinha</h1>
</app-modal>
